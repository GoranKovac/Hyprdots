# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = foot
$fileManager = nautilus -w
$browser = brave
$editor = zeditor
$menu = ~/.config/fuzzel/scripts/launcher.sh
$locate = ~/.config/fuzzel/scripts/locate.sh
$powermenu = ~/.config/fuzzel/scripts/powermenu.sh
$cp = ~/.config/fuzzel/scripts/clipboard.sh
$quicktools = ~/.config/fuzzel/scripts/quicktools.sh
$hpick = ~/.config/hypr/scripts/hpick
$hshot = ~/.config/hypr/scripts/hshot
$htop = ~/.config/hypr/scripts/htop.sh
$record = ~/.config/hypr/scripts/screenrecorder
$system = ~/.config/fuzzel/scripts/system.sh
